<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Web build CSP. Allows same-origin scripts plus blob-backed assets used by the in-memory runtime. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' blob:; font-src 'self' blob:; connect-src 'self' blob:; img-src 'self' data: blob:; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#405a78" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <title>Clear Writer</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="%BASE_URL%src/main.ts"></script>
  </body>
</html>
